# ── Formulaire score-gratuit ──
# Notifications email : Netlify UI → Forms → score-gratuit → Notifications
# → Add notification → Email → michel@troilodigital.be
# Chaque soumission déclenchera un email avec tous les champs (prénom, site, email, métier)
# + _replyto = email du prospect → Michel peut répondre d'un clic

[functions]
  directory = "netlify/functions"

# ── Redirects 301 — URLs accentuées → sans accent (fix Ahrefs 4XX) ──
[[redirects]]
  from = "/mentions-l%C3%A9gales/"
  to   = "/mentions-legales/"
  status = 301

[[redirects]]
  from = "/mentions-légales/"
  to   = "/mentions-legales/"
  status = 301

[[redirects]]
  from = "/politique-de-confidentialit%C3%A9/"
  to   = "/politique-de-confidentialite/"
  status = 301

[[redirects]]
  from = "/politique-de-confidentialité/"
  to   = "/politique-de-confidentialite/"
  status = 301

# ── Force HTTPS (évite chaîne HTTP→HTTPS→page) ──
[[redirects]]
  from = "http://troilodigital.be/*"
  to   = "https://troilodigital.be/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.troilodigital.be/*"
  to   = "https://troilodigital.be/:splat"
  status = 301
  force = true

# ── Confirmation formulaire score-gratuit ──
[[redirects]]
  from = "/score-gratuit/merci/"
  to   = "/score-gratuit/"
  status = 301

# ── Redirect audit-seo-essentiel → score-gratuit (produit 197€ → gratuit) ──
[[redirects]]
  from = "/audit-seo-essentiel/"
  to   = "/score-gratuit/"
  status = 301

[[redirects]]
  from = "/audit-seo-essentiel"
  to   = "/score-gratuit/"
  status = 301

# ── Short link Agent IA (tracking cold outreach) ──
[[redirects]]
  from = "/d/agent-ia"
  to   = "/agent-ia-artisan/?utm_source=cold&utm_medium=email&utm_campaign=agent-ia"
  status = 302

