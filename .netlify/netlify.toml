[[headers]]
for = "/*"

[headers.values]
Strict-Transport-Security = "max-age=31536000; includeSubDomains"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' fonts.googleapis.com api.fontshare.com; font-src fonts.gstatic.com cdn.fontshare.com; img-src 'self' data: images.unsplash.com www.facebook.com; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net unpkg.com www.googletagmanager.com www.clarity.ms scripts.clarity.ms connect.facebook.net; connect-src 'self' www.google-analytics.com region1.google-analytics.com www.clarity.ms www.facebook.com graph.facebook.com audits.troilodigital.be; frame-src api.leadconnectorhq.com www.facebook.com"

[[headers]]
for = "/*.webp"

[headers.values]
Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
for = "/*.svg"

[headers.values]
