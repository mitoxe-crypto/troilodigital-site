<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000d1f"/>
      <stop offset="100%" stop-color="#061530"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" rx="16" fill="url(#bgGrad)"/>

  <!-- Divider line -->
  <line x1="400" y1="50" x2="400" y2="390" stroke="#C9A84C" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- AVANT label -->
  <rect x="140" y="16" width="100" height="28" rx="14" fill="#ef4444" opacity="0.12"/>
  <text x="190" y="35" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="2">AVANT</text>

  <!-- APRÈS AUDIT label -->
  <rect x="530" y="16" width="140" height="28" rx="14" fill="#22c55e" opacity="0.12"/>
  <text x="600" y="35" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="2">APRÈS AUDIT</text>

  <!-- Arrow center -->
  <line x1="320" y1="220" x2="470" y2="220" stroke="#C9A84C" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <polygon points="470,215 480,220 470,225" fill="#C9A84C" opacity="0.6"/>

  <!-- === ROW 1: Position Google === -->
  <rect x="30" y="60" width="340" height="50" rx="10" fill="#0c1829" stroke="#1e293b" stroke-width="1"/>
  <text x="46" y="90" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Position Google</text>
  <text x="340" y="90" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="end">Page 4 — introuvable</text>

  <rect x="430" y="60" width="340" height="50" rx="10" fill="#0c1829" stroke="#15803d" stroke-width="1" opacity="0.8"/>
  <text x="446" y="90" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Position Google</text>
  <text x="740" y="90" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="end">Top 3 — 1ère page</text>

  <!-- === ROW 2: Trafic === -->
  <rect x="30" y="120" width="340" height="50" rx="10" fill="#0c1829" stroke="#1e293b" stroke-width="1"/>
  <text x="46" y="150" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Trafic organique mensuel</text>
  <text x="340" y="150" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="end">~20 visites/mois</text>

  <rect x="430" y="120" width="340" height="50" rx="10" fill="#0c1829" stroke="#15803d" stroke-width="1" opacity="0.8"/>
  <text x="446" y="150" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Trafic organique mensuel</text>
  <text x="740" y="150" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="end">~345 visites/mois</text>

  <!-- === ROW 3: Schema === -->
  <rect x="30" y="180" width="340" height="50" rx="10" fill="#0c1829" stroke="#1e293b" stroke-width="1"/>
  <text x="46" y="210" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Données structurées (schema)</text>
  <rect x="280" y="197" width="80" height="24" rx="5" fill="#991b1b" opacity="0.25"/>
  <text x="320" y="213" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Aucun</text>

  <rect x="430" y="180" width="340" height="50" rx="10" fill="#0c1829" stroke="#15803d" stroke-width="1" opacity="0.8"/>
  <text x="446" y="210" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Données structurées (schema)</text>
  <rect x="670" y="197" width="90" height="24" rx="5" fill="#15803d" opacity="0.25"/>
  <text x="715" y="213" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">3 blocs actifs</text>

  <!-- === ROW 4: GBP === -->
  <rect x="30" y="240" width="340" height="50" rx="10" fill="#0c1829" stroke="#1e293b" stroke-width="1"/>
  <text x="46" y="270" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Fiche Google Business</text>
  <rect x="270" y="257" width="90" height="24" rx="5" fill="#991b1b" opacity="0.25"/>
  <text x="315" y="273" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Incomplète</text>

  <rect x="430" y="240" width="340" height="50" rx="10" fill="#0c1829" stroke="#15803d" stroke-width="1" opacity="0.8"/>
  <text x="446" y="270" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Fiche Google Business</text>
  <rect x="670" y="257" width="90" height="24" rx="5" fill="#15803d" opacity="0.25"/>
  <text x="715" y="273" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Optimisée</text>

  <!-- === ROW 5: Meta === -->
  <rect x="30" y="300" width="340" height="50" rx="10" fill="#0c1829" stroke="#1e293b" stroke-width="1"/>
  <text x="46" y="330" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Meta descriptions</text>
  <rect x="270" y="317" width="90" height="24" rx="5" fill="#991b1b" opacity="0.25"/>
  <text x="315" y="333" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Absentes</text>

  <rect x="430" y="300" width="340" height="50" rx="10" fill="#0c1829" stroke="#15803d" stroke-width="1" opacity="0.8"/>
  <text x="446" y="330" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Meta descriptions</text>
  <rect x="670" y="317" width="90" height="24" rx="5" fill="#15803d" opacity="0.25"/>
  <text x="715" y="333" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">5 rédigées</text>

  <!-- === ROW 6: Visibilité IA === -->
  <rect x="30" y="360" width="340" height="50" rx="10" fill="#0c1829" stroke="#1e293b" stroke-width="1"/>
  <text x="46" y="390" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Visibilité IA (ChatGPT, Perplexity)</text>
  <rect x="280" y="377" width="80" height="24" rx="5" fill="#991b1b" opacity="0.25"/>
  <text x="320" y="393" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Aucune</text>

  <rect x="430" y="360" width="340" height="50" rx="10" fill="#0c1829" stroke="#15803d" stroke-width="1" opacity="0.8"/>
  <text x="446" y="390" font-family="Inter,sans-serif" font-size="12" fill="#64748b">Visibilité IA (ChatGPT, Perplexity)</text>
  <rect x="660" y="377" width="100" height="24" rx="5" fill="#15803d" opacity="0.25"/>
  <text x="710" y="393" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">llms.txt actif</text>

  <!-- Bottom note -->
  <text x="400" y="430" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle" opacity="0.6">Résultats réels — secteur alimentaire, Wallonie — nom masqué par confidentialité</text>
</svg>
